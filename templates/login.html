<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — ACP Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg-primary);">
        <div class="card animate-in" style="width: 100%; max-width: 420px;">
            <div class="card-header"><h3>🔐 Login — ACP Tracker</h3></div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('login') }}" id="login-form">
                    <div class="form-group">
                        <label class="form-label">Name</label>
                        <input type="text" name="name" class="form-input" id="login-name"
                               placeholder="Your name" value="Hưng" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Role</label>
                        <select name="role" class="form-select" id="login-role" required>
                            <option value="admin">Admin</option>
                            <option value="instructor">Instructor</option>
                            <option value="student">Student</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary" id="login-submit" style="width: 100%;">
                        Sign In
                    </button>
                </form>
                <p style="margin-top: 16px; font-size: 0.82rem; color: var(--text-tertiary);">
                    Demo access control: Admin/Instructor see all data; Students see own records only.
                </p>
            </div>
        </div>
    </div>
</body>
</html>
